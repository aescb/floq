<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--floq-chalk); font-family: var(--font-body); }
  .row { display: flex; gap: 6px; }
  .swatch { flex: 1; border-radius: 8px; height: 90px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .swatch-name { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; font-family: var(--font-display); }
  .swatch-val  { font-size: 10px; opacity: 0.78; font-family: var(--font-mono); }
  .group-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--floq-slate); margin-bottom: 8px; }
</style>
</head><body>
<div class="group-label">Neutros cálidos — Sin gris frío</div>
<div class="row">
  <div class="swatch" style="background:#0D1612"><span class="swatch-name" style="color:#fff">dark</span><span class="swatch-val" style="color:#fff">#0D1612</span></div>
  <div class="swatch" style="background:#1C2B21"><span class="swatch-name" style="color:#fff">ink</span><span class="swatch-val" style="color:#fff">#1C2B21</span></div>
  <div class="swatch" style="background:#4A5E53"><span class="swatch-name" style="color:#fff">slate</span><span class="swatch-val" style="color:#fff">#4A5E53</span></div>
  <div class="swatch" style="background:#8A9E93"><span class="swatch-name" style="color:#fff">fog</span><span class="swatch-val" style="color:#fff">#8A9E93</span></div>
  <div class="swatch" style="background:#D4E2DA"><span class="swatch-name" style="color:#0F2318">cloud</span><span class="swatch-val" style="color:#0F2318">#D4E2DA</span></div>
  <div class="swatch" style="background:#F3F7F5; border:1px solid #D4E2DA"><span class="swatch-name" style="color:#0F2318">paper</span><span class="swatch-val" style="color:#0F2318">#F3F7F5</span></div>
  <div class="swatch" style="background:#F9FBFA; border:1px solid #D4E2DA"><span class="swatch-name" style="color:#0F2318">chalk</span><span class="swatch-val" style="color:#0F2318">#F9FBFA</span></div>
</div>
</body></html>
