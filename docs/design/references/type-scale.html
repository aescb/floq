<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--floq-chalk); font-family: var(--font-body); }
  .row { display: grid; grid-template-columns: 80px 1fr 90px; gap: 12px; align-items: center; padding: 10px 0; border-bottom: 1px dashed var(--floq-cloud); }
  .row:last-child { border: none; }
  .label { font-family: var(--font-mono); font-size: 10px; color: var(--floq-fog); text-transform: uppercase; letter-spacing: 0.08em; }
  .specimen {
    font-family: var(--font-display); font-weight: 700; color: var(--floq-ink);
    letter-spacing: -0.01em; line-height: 1;
    font-variation-settings: 'wdth' 75, 'opsz' 144;
  }
  .specimen.heading { font-variation-settings: 'wdth' 85, 'opsz' 32; }
  .specimen.body {
    font-family: var(--font-body); font-weight: 400; line-height: 1.3;
    letter-spacing: 0; font-variation-settings: normal;
  }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--floq-slate); text-align: right; }
</style>
</head><body>
<div class="row"><span class="label">5xl</span><span class="specimen" style="font-size:72px; font-weight:800">Floq</span><span class="px">72px · 800 · w75</span></div>
<div class="row"><span class="label">3xl</span><span class="specimen" style="font-size:52px; font-weight:800">Pastoreo</span><span class="px">52px · 800 · w75</span></div>
<div class="row"><span class="label">2xl</span><span class="specimen heading" style="font-size:38px">Rebaño al día</span><span class="px">38px · 700 · w85</span></div>
<div class="row"><span class="label">xl</span><span class="specimen heading" style="font-size:30px">Cercas virtuales</span><span class="px">30px · 700 · w85</span></div>
<div class="row"><span class="label">lg</span><span class="specimen heading" style="font-size:24px; font-weight:600">Alertas del potrero</span><span class="px">24px · 600 · w85</span></div>
<div class="row"><span class="label">md</span><span class="specimen body" style="font-size:18px; font-weight:500">Vaca 214 · moviéndose al norte</span><span class="px">18px · 500</span></div>
<div class="row"><span class="label">base</span><span class="specimen body" style="font-size:16px; font-weight:400">Dibuja una cerca en el mapa y listo.</span><span class="px">16px · 400</span></div>
<div class="row"><span class="label">sm</span><span class="specimen body" style="font-size:13px; font-weight:400; color:var(--floq-slate)">Última actualización hace 2 min</span><span class="px">13px · 400</span></div>
</body></html>
