<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--floq-chalk); font-family: var(--font-body); }
  .group-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--floq-slate); margin-bottom: 20px; }
  .row { display: flex; gap: 20px; align-items: center; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 10px; }
  .box { width: 80px; height: 80px; background: #fff; border-radius: 12px; border: 1px solid rgba(39,103,63,0.08); }
  .token { font-family: var(--font-mono); font-size: 11px; color: var(--floq-slate); }
  .px { font-family: var(--font-mono); font-size: 9px; color: var(--floq-fog); }
</style>
</head><body>
<div class="group-label">Shadows · tintadas de verde</div>
<div class="row">
  <div class="item"><div class="box" style="box-shadow: 0 1px 2px rgba(15,35,24,0.06);"></div><span class="token">xs</span><span class="px">hairline</span></div>
  <div class="item"><div class="box" style="box-shadow: 0 2px 6px rgba(15,35,24,0.08), 0 1px 2px rgba(15,35,24,0.04);"></div><span class="token">sm</span><span class="px">cards</span></div>
  <div class="item"><div class="box" style="box-shadow: 0 4px 16px rgba(15,35,24,0.10), 0 2px 4px rgba(15,35,24,0.06);"></div><span class="token">md</span><span class="px">dropdowns</span></div>
  <div class="item"><div class="box" style="box-shadow: 0 8px 32px rgba(15,35,24,0.12), 0 4px 8px rgba(15,35,24,0.08);"></div><span class="token">lg</span><span class="px">modales</span></div>
  <div class="item"><div class="box" style="box-shadow: 0 16px 48px rgba(15,35,24,0.16), 0 8px 16px rgba(15,35,24,0.08);"></div><span class="token">xl</span><span class="px">overlays</span></div>
  <div class="item"><div class="box" style="box-shadow: 0 0 0 3px rgba(39,103,63,0.28);"></div><span class="token">focus</span><span class="px">anillo verde</span></div>
</div>
</body></html>
