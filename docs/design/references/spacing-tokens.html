<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--floq-chalk); font-family: var(--font-body); }
  .group-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--floq-slate); margin-bottom: 12px; }
  .row { display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .item { display: flex; align-items: center; gap: 8px; }
  .bar { height: 16px; background: var(--floq-grass); border-radius: 2px; }
  .token { font-family: var(--font-mono); font-size: 10px; color: var(--floq-slate); min-width: 38px; }
  .px { font-family: var(--font-mono); font-size: 10px; color: var(--floq-fog); }
</style>
</head><body>
<div class="group-label">Spacing · escala base 4</div>
<div class="row">
  <div class="item"><span class="token">1</span><span class="bar" style="width:4px"></span><span class="px">4</span></div>
  <div class="item"><span class="token">2</span><span class="bar" style="width:8px"></span><span class="px">8</span></div>
  <div class="item"><span class="token">3</span><span class="bar" style="width:12px"></span><span class="px">12</span></div>
  <div class="item"><span class="token">4</span><span class="bar" style="width:16px"></span><span class="px">16</span></div>
  <div class="item"><span class="token">5</span><span class="bar" style="width:20px"></span><span class="px">20</span></div>
  <div class="item"><span class="token">6</span><span class="bar" style="width:24px"></span><span class="px">24</span></div>
  <div class="item"><span class="token">8</span><span class="bar" style="width:32px"></span><span class="px">32</span></div>
  <div class="item"><span class="token">10</span><span class="bar" style="width:40px"></span><span class="px">40</span></div>
  <div class="item"><span class="token">12</span><span class="bar" style="width:48px"></span><span class="px">48</span></div>
  <div class="item"><span class="token">16</span><span class="bar" style="width:64px"></span><span class="px">64</span></div>
  <div class="item"><span class="token">20</span><span class="bar" style="width:80px"></span><span class="px">80</span></div>
  <div class="item"><span class="token">24</span><span class="bar" style="width:96px"></span><span class="px">96</span></div>
</div>
</body></html>
