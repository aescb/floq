<!DOCTYPE html>
<html lang="es"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--floq-chalk); font-family: var(--font-body); display: flex; flex-direction: column; gap: 14px; }
  .row { display: flex; gap: 6px; }
  .swatch { flex: 1; border-radius: 8px; height: 72px; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; }
  .swatch-name { font-size: 11px; font-weight: 700; letter-spacing: 0.04em; font-family: var(--font-display); }
  .swatch-val  { font-size: 10px; opacity: 0.78; font-family: var(--font-mono); }
  .group-label { font-size: 10px; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--floq-slate); }
</style>
</head><body>
<div>
  <div class="group-label">Verdes de marca — La tierra</div>
  <div class="row" style="margin-top:8px">
    <div class="swatch" style="background:#0F2318"><span class="swatch-name" style="color:#fff">leaf</span><span class="swatch-val" style="color:#fff">#0F2318</span></div>
    <div class="swatch" style="background:#1A3D29"><span class="swatch-name" style="color:#fff">pine</span><span class="swatch-val" style="color:#fff">#1A3D29</span></div>
    <div class="swatch" style="background:#27673F"><span class="swatch-name" style="color:#fff">grass</span><span class="swatch-val" style="color:#fff">#27673F</span></div>
    <div class="swatch" style="background:#3E8E5E"><span class="swatch-name" style="color:#fff">moss</span><span class="swatch-val" style="color:#fff">#3E8E5E</span></div>
    <div class="swatch" style="background:#72BB91"><span class="swatch-name" style="color:#0F2318">sprout</span><span class="swatch-val" style="color:#0F2318">#72BB91</span></div>
    <div class="swatch" style="background:#B2D9C2"><span class="swatch-name" style="color:#0F2318">meadow</span><span class="swatch-val" style="color:#0F2318">#B2D9C2</span></div>
    <div class="swatch" style="background:#E6F2EC; border:1px solid #D4E2DA"><span class="swatch-name" style="color:#0F2318">mist</span><span class="swatch-val" style="color:#0F2318">#E6F2EC</span></div>
  </div>
</div>
<div>
  <div class="group-label">Ámbar accent — Sol, salud, alertas</div>
  <div class="row" style="margin-top:8px">
    <div class="swatch" style="background:#9E4E00"><span class="swatch-name" style="color:#fff">ember</span><span class="swatch-val" style="color:#fff">#9E4E00</span></div>
    <div class="swatch" style="background:#D97706"><span class="swatch-name" style="color:#fff">amber</span><span class="swatch-val" style="color:#fff">#D97706</span></div>
    <div class="swatch" style="background:#F5B942"><span class="swatch-name" style="color:#0F2318">honey</span><span class="swatch-val" style="color:#0F2318">#F5B942</span></div>
    <div class="swatch" style="background:#FEF3DC; border:1px solid #F5B942"><span class="swatch-name" style="color:#9E4E00">cream</span><span class="swatch-val" style="color:#9E4E00">#FEF3DC</span></div>
  </div>
</div>
</body></html>
